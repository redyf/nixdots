format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[directory]

[character]
success_symbol = "[тЮЬ](bold green)" # тЮЬ тЬЧ ╬╗
error_symbol = "[тЮЬ](bold red)"
vimcmd_symbol = "[тЮЬ](bold purple)"

[git_branch]
format = "[$branch]($style)"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
conflicted = "тАЛ"
untracked = "тАЛ"
modified = "тАЛ"
staged = "тАЛ"
renamed = "тАЛ"
deleted = "тАЛ"
stashed = "тЙб"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[cmd_duration]
format = "[$duration]($style) "

[python]
format = "[$virtualenv]($style) "

